<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modus AI — Merchant Risk Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --ink: #14110f;
  --paper: #f5f1ea;
  --paper-2: #ebe5da;
  --paper-soft: #faf7f1;
  --rule: #d8d0c2;
  --muted: #6b6357;
  --accent: #b8410f;
  --good: #2f5e3a;
  --good-bg: #e6ebe1;
  --warn: #8a5a0a;
  --warn-bg: #f0e6cf;
  --bad: #7a1f10;
  --bad-bg: #f0d9d2;
  --serif: 'Fraunces', 'Times New Roman', serif;
  --sans: 'Inter Tight', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Menlo', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ─────────── TOP BAR ─────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
  cursor: pointer;
}
.brand .dot { color: var(--accent); }
.crumbs {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.crumbs span { color: var(--ink); }
.crumbs .sep { padding: 0 8px; opacity: 0.4; }
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: grid; place-items: center;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0;
}

/* ─────────── SHELL ─────────── */
.shell {
  max-width: 1340px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

/* ─────────── BUTTONS ─────────── */
.btn {
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0.01em;
  padding: 10px 18px;
  border: 1px solid var(--ink);
  background: var(--paper);
  color: var(--ink);
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.primary { background: var(--ink); color: var(--paper); }
.btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.btn.danger { color: var(--bad); border-color: var(--bad); }
.btn.danger:hover { background: var(--bad); color: var(--paper); border-color: var(--bad); }
.btn.ghost { border-color: var(--rule); color: var(--muted); }
.btn.ghost:hover { background: var(--paper-2); color: var(--ink); border-color: var(--ink); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.lg { padding: 14px 28px; font-size: 14px; }

/* ─────────── PAGE HEADERS ─────────── */
.page-kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.page-sub {
  font-size: 15px;
  color: var(--muted);
  max-width: 680px;
  line-height: 1.55;
  margin-bottom: 32px;
}
.section-rule {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 32px 0;
}

/* ═══════════════════════════════════════
   SCREEN 1 — QUEUE
═══════════════════════════════════════ */
.queue-header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 24px;
  margin-bottom: 32px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  margin-bottom: 32px;
  border: 1px solid var(--rule);
  background: var(--paper-soft);
}
.stat {
  padding: 18px 22px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: none; }
.stat-label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.stat-value.legit { color: var(--good); }
.stat-value.review { color: var(--warn); }
.stat-value.susp { color: var(--bad); }

.queue-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--paper);
}
.queue-table th {
  text-align: left;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  background: var(--paper-soft);
  font-weight: 500;
}
.queue-table td {
  padding: 16px;
  border-bottom: 1px solid var(--rule);
  font-size: 13.5px;
}
.queue-table tr.queue-row { cursor: pointer; transition: background 0.1s ease; }
.queue-table tr.queue-row:hover { background: var(--paper-soft); }
.queue-table .merchant-name {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.005em;
}
.queue-table .merchant-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}
.queue-table .id-cell {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.queue-table .ts-cell {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--muted);
}

/* verdict pill */
.verdict-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid;
}
.verdict-pill.legitimate { color: var(--good); background: var(--good-bg); border-color: var(--good); }
.verdict-pill.review     { color: var(--warn); background: var(--warn-bg); border-color: var(--warn); }
.verdict-pill.suspicious { color: var(--bad);  background: var(--bad-bg);  border-color: var(--bad);  }
.verdict-pill.pending    { color: var(--muted); background: var(--paper-2); border-color: var(--rule); }
.verdict-pill .dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}

.score-cell {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}

/* ═══════════════════════════════════════
   SCREEN 2 — SUBMIT FORM
═══════════════════════════════════════ */
.form-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 60px;
  margin-top: 32px;
}
.form-card {
  border: 1px solid var(--rule);
  background: var(--paper);
  padding: 32px;
}
.form-card h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 24px;
  font-weight: 500;
}
.field {
  display: flex;
  flex-direction: column;
  margin-bottom: 18px;
}
.field label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  border: none;
  border-bottom: 1px solid var(--rule);
  background: transparent;
  padding: 8px 0;
  font-size: 14.5px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s ease;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-bottom-color: var(--accent);
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.form-side {
  padding-top: 8px;
}
.form-side h4 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}
.form-side p {
  font-size: 13.5px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 16px;
}
.preset-list {
  border: 1px solid var(--rule);
  background: var(--paper-soft);
  margin-top: 24px;
}
.preset-item {
  padding: 14px 18px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.1s ease;
}
.preset-item:last-child { border-bottom: none; }
.preset-item:hover { background: var(--paper-2); }
.preset-name {
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.005em;
}
.preset-desc {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 3px;
}
.preset-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 6px;
  margin-top: 6px;
  margin-right: 4px;
  background: var(--paper);
  border: 1px solid var(--rule);
  color: var(--muted);
}

.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
}

/* ═══════════════════════════════════════
   SCREEN 3 — PROCESSING
═══════════════════════════════════════ */
.processing-shell {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 60px;
  margin-top: 16px;
}
.processing-status h2 {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 12px;
}
.processing-merchant {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 32px;
  letter-spacing: 0.02em;
}
.progress-bar {
  height: 4px;
  background: var(--paper-2);
  position: relative;
  margin-bottom: 32px;
  overflow: hidden;
}
.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--accent);
  transition: width 0.4s ease;
}
.track-header {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 24px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.track-header .bar {
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.enrichment-list {
  display: flex;
  flex-direction: column;
}
.enrichment-row {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule);
  font-size: 13px;
}
.enrichment-row:last-child { border-bottom: none; }
.enrichment-row .icon {
  width: 20px; height: 20px;
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
}
.enrichment-row.pending .icon { color: var(--muted); }
.enrichment-row.running .icon { color: var(--warn); animation: pulse 1.4s infinite; }
.enrichment-row.done .icon    { color: var(--good); }
.enrichment-row.flag .icon    { color: var(--bad); }

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.enrichment-row .name {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.02em;
}
.enrichment-row .result {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
}
.enrichment-row.flag .result { color: var(--bad); font-weight: 600; }

.processing-side {
  border-left: 1px solid var(--rule);
  padding-left: 32px;
}
.processing-side h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  font-weight: 500;
}
.kv-list {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 4px 12px;
  font-size: 12.5px;
}
.kv-list dt {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: 3px;
}
.kv-list dd {
  font-weight: 500;
  border-bottom: 1px dotted var(--rule);
  padding-bottom: 6px;
  margin-bottom: 2px;
  word-break: break-word;
}

/* ═══════════════════════════════════════
   SCREEN 4 — DECISION
═══════════════════════════════════════ */
.verdict-block {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
  padding-bottom: 28px;
  border-bottom: 2px solid var(--ink);
}
.merchant-name-big {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 52px;
  line-height: 1.02;
  letter-spacing: -0.02em;
}
.merchant-meta-big {
  margin-top: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.merchant-meta-big span { color: var(--ink); }
.verdict-big {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.verdict-big-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.verdict-big-value {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 36px;
  letter-spacing: -0.015em;
  padding: 4px 18px;
  line-height: 1.1;
  border: 1px solid;
}
.verdict-big-value.legitimate { background: var(--good-bg); color: var(--good); border-color: var(--good); }
.verdict-big-value.review     { background: var(--warn-bg); color: var(--warn); border-color: var(--warn); }
.verdict-big-value.suspicious { background: var(--bad-bg);  color: var(--bad);  border-color: var(--bad);  }
.verdict-big-stats {
  display: flex;
  gap: 22px;
  margin-top: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.verdict-big-stats b {
  color: var(--ink);
  font-weight: 600;
}

.deciding-grid {
  display: grid;
  grid-template-columns: 1.7fr 1fr;
  gap: 40px;
  margin-top: 36px;
}

.brief {
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.55;
  font-weight: 400;
  border-left: 3px solid var(--accent);
  padding: 4px 0 4px 20px;
  color: var(--ink);
}

/* sections inside decision page */
.section-block { margin-top: 36px; }
.section-block-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}
.section-block-title .num {
  display: inline-grid;
  place-items: center;
  width: 22px; height: 22px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
}

.inputs-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  border: 1px solid var(--rule);
  padding: 20px 24px;
  background: var(--paper-soft);
}
.inputs-grid .field-display {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.inputs-grid .field-display .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.inputs-grid .field-display .value {
  font-size: 14px;
  font-weight: 500;
}

.evidence-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.col-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.col-title .bar { display: inline-block; width: 18px; height: 1px; }
.col-title.good .bar { background: var(--good); }
.col-title.warn .bar { background: var(--warn); }
.col-title.good { color: var(--good); }
.col-title.warn { color: var(--warn); }
.evidence-list { display: flex; flex-direction: column; gap: 12px; }
.ev {
  border: 1px solid var(--rule);
  background: var(--paper);
  padding: 14px 16px;
}
.ev.good { border-left: 3px solid var(--good); }
.ev.warn { border-left: 3px solid var(--warn); }
.ev-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
}
.ev-title {
  font-weight: 600;
  font-size: 13.5px;
  letter-spacing: -0.005em;
}
.ev-quality {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.ev-quality.high { color: var(--ink); }
.ev-body {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
}
.ev-source {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
}

.side-panel {
  border-left: 1px solid var(--rule);
  padding-left: 32px;
}
.side-panel h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  font-weight: 500;
}
.side-block { margin-bottom: 32px; }

.score-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
}
.score-num-big {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 52px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.score-num-big.legit { color: var(--good); }
.score-num-big.review { color: var(--warn); }
.score-num-big.susp { color: var(--bad); }
.score-of {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}
.score-bar {
  position: relative;
  height: 6px;
  background: var(--paper-2);
  margin-top: 6px;
}
.score-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  transition: width 0.6s ease;
}
.score-bar-fill.legit { background: var(--good); }
.score-bar-fill.review { background: var(--warn); }
.score-bar-fill.susp { background: var(--bad); }
.score-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.score-ticks .legit-t { color: var(--good); }
.score-ticks .review-t { color: var(--warn); }
.score-ticks .susp-t { color: var(--bad); }

.actions {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;

  let h = 0;
  for (let i = 0; i < s.length; i++) {

    confidence = 0.85 + (seed % 10) / 100;
  } else if (score >= 61) {
    verdict = "Suspicious";
    confidence = 0.85 + (seed % 12) / 100;
  } else {
    verdict = "Needs Review";
    confidence = 0.70 + (seed % 18) / 100;
  }
  confidence = Math.round(confidence * 100) / 100;

  return { score, verdict, confidence, flags, seed };
}

// ═══════════════════════════════════════════════════════════
// EVIDENCE BUILDER (from flags + inputs)
// ═══════════════════════════════════════════════════════════
function buildEvidence(inputs, calc) {
  const supporting = [];
  const concerning = [];

  // Always-on supporting if entity looks formed
  if (calc.flags.cleanEntity) {
    supporting.push({
      title: "Active Pvt Ltd / LLP entity",
      quality: "High · Rule",
      body: `${inputs.legalName} is a registered legal entity with status "Active" in the corporate registry. Directors clean, no disqualifications.`,
      source: "MCA21 entity lookup · verified just now",
    });
  }

  if (!calc.flags.riskyKeyword && !calc.flags.suspiciousTLD) {
    supporting.push({
      title: "Domain looks established",
      quality: "Medium · Rule",
      body: `Domain ${inputs.website} resolves successfully with valid SSL. WHOIS shows clean registrant data.`,
      source: "WHOIS + HTTP probe",
    });
  }

  if (!calc.flags.addressCluster) {
    supporting.push({
      title: "No infrastructure overlap",
      quality: "High · Graph",
      body: "Address, phone, email, and registrant do not match any prior flagged merchant in the consortium graph.",
      source: "Internal graph DB · 1.2M historical merchants",
    });
  }

  if (calc.score < 30 && !calc.flags.freeEmail) {
    supporting.push({
      title: "Contact details consistent",
      quality: "Medium · Rule + AI",
      body: "Email domain matches website domain; phone number is mobile/landline (not VoIP); no contact reuse detected.",
      source: "Email DNS check + Numverify-style API",
    });
  }

  // CONCERNING
  if (calc.flags.industryMismatch) {
    concerning.push({
      title: "Industry mismatch on website",
      quality: "High · AI · 0.91",
      body: `Declared "${inputs.industry}" does not match the observed website content. The LOB description suggests gambling-adjacent activity disguised as education.`,
      source: `${inputs.website} · LLM website analysis · prompt v2.4`,
    });
  }

  if (calc.flags.suspiciousTLD) {
    concerning.push({
      title: `Suspicious TLD: ${calc.flags.suspiciousTLD}`,
      quality: "High · Rule",
      body: `The website uses TLD ${calc.flags.suspiciousTLD}, commonly associated with gambling, scams, or short-lived shell sites. Cross-check with declared category required.`,
      source: "WHOIS + internal TLD risk policy",
    });
  }

  if (calc.flags.riskyKeyword) {
    concerning.push({
      title: "Red-flag keyword detected",
      quality: "High · AI",
      body: `The phrase "${calc.flags.riskyKeyword}" was detected in the merchant's declared business or website content. This phrase is on the high-risk content list.`,
      source: "LLM website analysis · evidence quoted from page",
    });
  }

  if (calc.flags.addressCluster) {
    concerning.push({
      title: "Address cluster — repeat infrastructure",
      quality: "High · Graph",
      body: `The address "${inputs.address}" matches three previously-flagged merchants from the last 90 days. This is a strong mule-cluster signal.`,
      source: "Internal graph DB",
    });
  }

  if (calc.flags.highRiskSegment) {
    concerning.push({
      title: "Elevated MCC category",
      quality: "High · Rule",
      body: `${calc.flags.highRiskSegment} is on the PA's elevated-monitoring list. Requires additional license verification per category policy.`,
      source: "Internal MCC risk policy v3.1",
    });
  }

  if (calc.flags.freeEmail) {
    concerning.push({
      title: "Free-provider contact email",
      quality: "Medium · Rule",
      body: `The contact email uses a free provider (Gmail/Yahoo/etc.). For the declared business type, a domain-matched email would be more appropriate.`,
      source: "Email DNS check",
    });
  }

  return { supporting, concerning };
}

function buildAnalystBrief(inputs, calc, evidence) {
  if (calc.verdict === "Legitimate") {
    return `${inputs.legalName} presents as a legitimately registered ${(inputs.industry || "").toLowerCase()} merchant with a clean entity, consistent contact details, and no infrastructure overlap with prior flagged merchants. All High-quality signals are corroborating. Recommended action: auto-approve at standard MDR.`;
  }
  if (calc.verdict === "Suspicious") {
    return `${inputs.legalName} declares ${(inputs.industry || "").toLowerCase()} but multiple High-quality signals indicate the actual business is not what is declared. The strongest concerning evidence: ${(evidence.concerning[0] || {}).title || "industry mismatch"}. Recommended action: route to senior reviewer; do not approve without manual verification.`;
  }
  return `${inputs.legalName} presents as a registered merchant in a higher-risk category. While entity, directors, and infrastructure signals are clean, the ${(inputs.subSegment || "").toLowerCase()} category and ${evidence.concerning.length > 0 ? evidence.concerning[0].title.toLowerCase() : "category-driven flags"} warrant manual verification before approval.`;
}

// SCREEN 3 — PROCESSING (animated)
// ─────────────────────────────────────────────
function ProcessingScreen({ inputs, onComplete }) {
  const [enrichmentStates, setEnrichmentStates] = useState(
    ENRICHMENTS.map(() => ({ status: "pending", result: "" }))
  );
  const [progress, setProgress] = useState(0);
  const calcRef = useRef(null);

  useEffect(() => {
    calcRef.current = calculateVerdict(inputs);
    let cumulative = 0;
    const totalDuration = ENRICHMENTS.reduce((acc, e) => acc + e.duration, 0);
    const compressedTotal = 4500;
    const scale = compressedTotal / totalDuration;

    ENRICHMENTS.forEach((e, idx) => {
      const startAt = cumulative * scale;
      const endAt = (cumulative + e.duration) * scale;
      cumulative += e.duration;

      // start
      setTimeout(() => {
        setEnrichmentStates(prev => {
          const next = [...prev];
          next[idx] = { ...next[idx], status: "running" };
          return next;
        });
      }, startAt);

      // end
      setTimeout(() => {
        setEnrichmentStates(prev => {
          const next = [...prev];
          const isFlag = decideFlag(e, calcRef.current);
          next[idx] = {
            ...next[idx],
            status: isFlag ? "flag" : "done",
            result: enrichmentResult(e, inputs, calcRef.current, isFlag),
          };
          return next;
        });
        setProgress(((idx + 1) / ENRICHMENTS.length) * 100);
      }, endAt);
    });

    // Auto-advance
    setTimeout(() => onComplete(calcRef.current), compressedTotal + 800);
  }, []);

  return (
    <>
      <div className="processing-shell">
        <div className="processing-status">
          <div className="page-kicker">RUNNING PIPELINE</div>
          <h2>Enriching merchant signals</h2>
          <div className="processing-merchant">{inputs.legalName} · {inputs.website}</div>

          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${progress}%` }}></div>
          </div>

          <div className="track-header">
            <span>Track A · Deterministic enrichments</span>
            <span className="bar"></span>
          </div>
          <div className="enrichment-list">
            {ENRICHMENTS.map((e, idx) => e.track === "A" && (
              <EnrichmentRow key={idx} e={e} state={enrichmentStates[idx]} />
            ))}
          </div>

          <div className="track-header">
            <span>Track B · AI enrichments</span>
            <span className="bar"></span>
          </div>
          <div className="enrichment-list">
            {ENRICHMENTS.map((e, idx) => e.track === "B" && (
              <EnrichmentRow key={idx} e={e} state={enrichmentStates[idx]} />
            ))}
          </div>
        </div>

        <div className="processing-side">
          <h3>Submitted application</h3>
          <dl className="kv-list">
            <dt>Entity</dt><dd>{inputs.legalName}</dd>
            <dt>Website</dt><dd>{inputs.website}</dd>
            <dt>Industry</dt><dd>{inputs.industry}</dd>
            <dt>Sub-seg</dt><dd>{inputs.subSegment}</dd>
            <dt>LOB</dt><dd>{inputs.lob}</dd>
            <dt>Phone</dt><dd>{inputs.phone}</dd>
            <dt>Email</dt><dd>{inputs.email}</dd>
            <dt>Address</dt><dd>{inputs.address}</dd>
          </dl>
        </div>
      </div>
    </>
  );
}

function EnrichmentRow({ e, state }) {
  const icon = state.status === "pending" ? "○"
              : state.status === "running" ? "●"
              : state.status === "flag" ? "✕"
              : "✓";
  return (
    <div className={`enrichment-row ${state.status}`}>
      <span className="icon">{icon}</span>
      <span className="name">{e.name}</span>
      <span className="result">{state.result}</span>
    </div>
  );
}

function decideFlag(enrichment, calc) {
  const f = calc.flags;
  if (enrichment.name.includes("Graph") && f.addressCluster) return true;
  if (enrichment.name.includes("Website content") && f.industryMismatch) return true;
  if (enrichment.name.includes("Industry") && f.industryMismatch) return true;
  if (enrichment.name.includes("WHOIS") && f.suspiciousTLD) return true;
  return false;
}

function enrichmentResult(enrichment, inputs, calc, isFlag) {
  if (isFlag) {
    if (enrichment.name.includes("Graph")) return "3 matches";
    if (enrichment.name.includes("Website")) return "mismatch";
    if (enrichment.name.includes("Industry")) return "mismatch";
    if (enrichment.name.includes("WHOIS")) return "flagged TLD";
    return "flagged";
  }
  if (enrichment.name.includes("MCA21")) return "Active";
  if (enrichment.name.includes("GSTIN")) return "Active";
  if (enrichment.name.includes("Sanctions")) return "No hit";
  if (enrichment.name.includes("WHOIS")) return "Clean";
  if (enrichment.name.includes("Address")) return "Commercial";
  if (enrichment.name.includes("Phone")) return "Mobile";
  if (enrichment.name.includes("Email")) return "Deliverable";
  if (enrichment.name.includes("Graph")) return "No matches";
  if (enrichment.name.includes("Website")) return "Match · 0.9";
  if (enrichment.name.includes("Industry")) return "Match";
  if (enrichment.name.includes("Adverse")) return "No findings";
  return "OK";
}

        { k: "Status", v: "Active", tone: "ok" },

        { k: "Type", v: "Mobile", tone: "ok" },
        { k: "Carrier", v: "Vodafone Idea Limited" },
        { k: "Roaming", v: "No" },
        { k: "Disposable", v: "No", tone: "ok" },
        { k: "Format E.164", v: "+91" + (inputs.phone || "").replace(/\D/g, "").slice(-10) },
      ],
    };
  }

  // Email DNS check
  if (s.includes("email dns") || s.includes("smtp probe") || s.includes("email")) {
    const isFree = /(gmail|yahoo|hotmail|outlook)\./.test((inputs.email || "").toLowerCase());
    return {
      kind: "email",
      title: "Email deliverability + DNS check",
      kicker: "SMTP probe + DNS records",
      status: isFree ? "warn" : "ok",
      statusLabel: isFree ? "Free provider · domain mismatch" : "Deliverable · domain match",
      fetchedAt: ts,
      kvs: [
        { k: "Email", v: inputs.email || "—" },
        { k: "Domain match", v: isFree ? "no (free provider)" : "yes (matches website)", tone: isFree ? "warn" : "ok" },
        { k: "MX records", v: "Valid", tone: "ok" },
        { k: "SPF", v: "Pass", tone: "ok" },
        { k: "DMARC", v: isFree ? "Pass (provider default)" : "Pass (configured)" },
        { k: "Deliverable", v: "Yes (SMTP 250)", tone: "ok" },
        { k: "Disposable", v: "No", tone: "ok" },
      ],
    };
  }

  // Sanctions
  if (s.includes("sanctions") || s.includes("ofac") || s.includes("rbi")) {
    return {
      kind: "sanctions",
      title: "Sanctions & defaulter screening",
      kicker: "OFAC · UN · RBI · MAS · OFSI",
      status: "ok",
      statusLabel: "No hit · 200 OK",
      fetchedAt: ts,
      intro: `Screened the entity name and all directors against five international sanctions and defaulter lists. No matches above the 0.92 fuzzy-match threshold.`,
      kvs: [
        { k: "Entity name", v: inputs.legalName || "—" },
        { k: "OFAC SDN", v: "No hit", tone: "ok" },
        { k: "UN Consolidated", v: "No hit", tone: "ok" },
        { k: "RBI defaulter list", v: "No hit", tone: "ok" },
        { k: "MAS Singapore", v: "No hit", tone: "ok" },
        { k: "OFSI UK", v: "No hit", tone: "ok" },
        { k: "Match threshold", v: "0.92 fuzzy" },
        { k: "Lists last refreshed", v: "6 hours ago" },
      ],
    };
  }

  // GSTIN
  if (s.includes("gstin")) {
    return {
      kind: "gstin",
      title: "GSTIN verification",
      kicker: "Goods and Services Tax portal",
      status: "ok",
      statusLabel: "Active · 200 OK",
      fetchedAt: ts,
      kvs: [
        { k: "GSTIN", v: "27AABCU" + (calc?.seed % 10000 || 9603) + "C1ZK" },
        { k: "Status", v: "Active", tone: "ok" },
        { k: "Trade name", v: inputs.legalName || "—" },
        { k: "State", v: "Maharashtra (27)" },
        { k: "Registered on", v: "23 Aug 2019" },
        { k: "Filing status", v: "All returns up to date", tone: "ok" },
        { k: "Last filed", v: "GSTR-1 · Mar 2026" },
      ],
    };
  }

  // Google Places
  if (s.includes("google places") || s.includes("geocoding")) {
    return {
      kind: "places",
      title: "Address resolution · Google Places",
      kicker: "Geocoding & business details",
      status: "ok",
      statusLabel: "Resolved · 200 OK",
      fetchedAt: ts,
      kvs: [
        { k: "Address", v: inputs.address || "—" },
        { k: "Resolved", v: "Yes (exact match)", tone: "ok" },
        { k: "Place type", v: "Commercial · Office" },
        { k: "Latitude", v: "12.9716" },
        { k: "Longitude", v: "77.6411" },
        { k: "Plus code", v: "7J4V+8H Bengaluru" },
        { k: "Business listed", v: "Yes (matches name)", tone: "ok" },
        { k: "Photos available", v: "12 (latest 11 days ago)" },
      ],
    };
  }

  // MCC policy
  if (s.includes("mcc")) {
    const high = !!calc?.flags?.highRiskSegment;
    return {
      kind: "mcc",
      title: "MCC risk policy lookup",
      kicker: "Internal policy v3.1",
      status: high ? "warn" : "ok",
      statusLabel: high ? "Elevated MCC · review required" : "Standard MCC · auto-approve eligible",
      fetchedAt: ts,
      kvs: [
        { k: "Declared sub-segment", v: inputs.subSegment || "—" },
        { k: "Mapped MCC", v: high ? "5912 (Drug Stores)" : "5651 (Family Clothing)" },
        { k: "Tier", v: high ? "Elevated" : "Standard", tone: high ? "warn" : "ok" },
        { k: "Required licenses", v: high ? "FSSAI + AYUSH manufacturing" : "Trade license only" },
        { k: "Reserve %", v: high ? "5% rolling" : "0%" },
        { k: "MDR adjustment", v: high ? "+0.4%" : "Standard" },
      ],
    };
  }

  // Adverse media RAG
  if (s.includes("adverse media") || s.includes("rag")) {
    return {
      kind: "adverse",
      title: "Adverse media · RAG search",
      kicker: "Web search + grounded LLM synthesis",
      status: "ok",
      statusLabel: "No findings · 200 OK",
      fetchedAt: ts,
      intro: `Searched 14 news sources, regulatory bulletins, and consumer-complaint sites for the entity name and director names. No adverse mentions found above the 0.85 subject-match confidence threshold.`,
      kvs: [
        { k: "Search query", v: `"${inputs.legalName || "—"}" OR (director names)` },
        { k: "Sources scanned", v: "14" },
        { k: "Results retrieved", v: "0 with subject_match ≥ 0.85", tone: "ok" },
        { k: "Window", v: "All time" },
        { k: "Model", v: "claude-opus-4-7" },
        { k: "Prompt version", v: "adverse-media-v1.3" },
      ],
    };
  }

  // Default fallback
  return {
    kind: "generic",
    title: sourceText || "Source detail",
    kicker: "Enrichment data",
    status: "ok",
    statusLabel: "Verified · 200 OK",
    fetchedAt: ts,
    kvs: [
      { k: "Source", v: sourceText || "—" },
      { k: "Status", v: "OK", tone: "ok" },
    ],
  };
}

function EnrichmentsScreen({ merchant, onBack, onSourceClick }) {
  const { inputs } = merchant;
  const calc = { flags: deriveFlagsFromMerchant(merchant), confidence: merchant.confidence, seed: hashStr(JSON.stringify(merchant.inputs)) };

  // Build all 11 enrichments with their status, summary, source-string, and details
  const enrichments = [
    // Identity & Legal
    { cat: "Identity & Legal", name: "MCA21 entity lookup", flagged: false, summary: "Active Pvt Ltd — directors clean, no disqualifications", source: "MCA21 entity lookup · verified just now", body: "The Ministry of Corporate Affairs registry confirms the entity is active, has paid-up capital matching the declared structure, and all directors are DIN-verified." },
    { cat: "Identity & Legal", name: "GSTIN verification", flagged: false, summary: "GSTIN active — all returns filed up to FY24", source: "GSTIN portal lookup", body: "GST registration is active. The trade name on the GSTIN matches the legal entity name. All recent returns have been filed on time." },
    { cat: "Identity & Legal", name: "Sanctions & defaulter screening", flagged: false, summary: "No hit on any list (OFAC, UN, RBI, MAS, OFSI)", source: "Sanctions / OFAC / RBI defaulter check", body: "Entity name and all directors screened against 5 international sanctions and defaulter lists. No matches above the 0.92 fuzzy-match threshold. Lists refreshed 6 hours ago." },

    // Digital Footprint
    { cat: "Digital Footprint", name: "WHOIS · domain age", flagged: !!calc.flags.suspiciousTLD, summary: calc.flags.suspiciousTLD ? `Suspicious TLD detected — domain registered 47 days ago` : "Domain healthy · registered 5+ years ago", source: "WHOIS + HTTP probe", body: calc.flags.suspiciousTLD ? `The domain uses TLD ${calc.flags.suspiciousTLD}, which is on the high-risk TLD list. Combined with a recent registration, this is a strong negative signal.` : "Domain age and registrar are consistent with an established business. SSL valid, hosted on AWS Mumbai." },
    { cat: "Digital Footprint", name: "Website content analysis (Task 1)", flagged: !!calc.flags.industryMismatch || !!calc.flags.riskyKeyword, summary: (calc.flags.industryMismatch || calc.flags.riskyKeyword) ? `Industry mismatch detected — confidence 0.91` : `Industry match confirmed — confidence ${calc.confidence}`, source: "LLM website analysis · prompt v2.4", body: (calc.flags.industryMismatch || calc.flags.riskyKeyword) ? `The LLM found that the actual website content does not match the declared industry. The model surfaced a verbatim quote from the page as evidence.` : "The LLM confirmed the site's content is consistent with the declared category and sub-segment." },

    // Contact
    { cat: "Contact", name: "Phone validity & type", flagged: false, summary: "Valid mobile · Vodafone Idea India", source: "Phone validation API (Numverify-style)", body: "Phone number resolves to a valid Indian mobile carrier. Not VoIP, not disposable, not roaming. E.164 format normalized." },
    { cat: "Contact", name: "Email deliverability", flagged: !!calc.flags.freeEmail, summary: calc.flags.freeEmail ? "Free provider — domain mismatch" : "Deliverable · domain matches website", source: "Email DNS check + SMTP probe", body: calc.flags.freeEmail ? "Email uses a free provider (Gmail/Yahoo/etc.). For the declared business type, a domain-matched email would be expected." : "Email domain matches website domain. MX records valid, SPF and DMARC pass, mailbox is deliverable." },

    // Address & Graph
    { cat: "Address & Graph", name: "Address resolution (Google Places)", flagged: false, summary: "Resolved · commercial office address", source: "Google Places / geocoding", body: "Address resolves to a commercial property. Plus code matches the registered city. Google Places shows a business listing matching the legal entity name with recent photos." },
    { cat: "Address & Graph", name: "Internal graph DB · address/phone/email reuse", flagged: !!calc.flags.addressCluster, summary: calc.flags.addressCluster ? "Cluster detected — 3 prior flagged merchants" : "No matches against 1.2M historical merchants", source: "Internal graph DB · 1.2M historical merchants", body: calc.flags.addressCluster ? "The submitted address and phone match three previously-flagged merchants from the last 90 days. This is a strong infrastructure-reuse signal indicating a possible mule cluster." : "No linkage found against any flagged merchant in the consortium graph for the past 90 days." },

    // AI Tasks
    { cat: "AI Tasks", name: "Industry × declared category match", flagged: !!calc.flags.industryMismatch, summary: calc.flags.industryMismatch ? "Mismatch — declared vs. observed business" : "Match — declared category consistent with observations", source: "LLM analysis · prompt v2.4", body: calc.flags.industryMismatch ? "The declared industry is not consistent with what the website actually offers. This is the highest-stakes AI signal in the system — the most common shape of transaction-laundering attempts." : "The declared industry, sub-segment, and line of business are consistent across all evidence streams." },
    { cat: "AI Tasks", name: "Adverse media RAG", flagged: false, summary: "No adverse findings (subject_match ≥ 0.85)", source: "Adverse media RAG · prompt v1.3", body: "Searched 14 news sources, regulatory bulletins, and consumer-complaint sites. No adverse mentions found for the entity or any director above the subject-match confidence threshold." },
  ];

  // Group by category
  const grouped = enrichments.reduce((acc, e) => {
    if (!acc[e.cat]) acc[e.cat] = [];
    acc[e.cat].push(e);
    return acc;
  }, {});

  // Smart-default expand state: flagged ones expanded
  const [expanded, setExpanded] = useState(() => {
    const init = {};
    enrichments.forEach((e, i) => { init[i] = e.flagged; });
    return init;
  });

  function toggle(idx) {
    setExpanded(prev => ({ ...prev, [idx]: !prev[idx] }));
  }

  // Stats
  const total = enrichments.length;
  const clean = enrichments.filter(e => !e.flagged).length;
  const flagged = enrichments.filter(e => e.flagged).length;

  let globalIdx = 0;

  return (
    <>
      <div style={{ marginBottom: 16 }}>
        <button className="btn ghost" onClick={onBack}>← Back to decision</button>
      </div>

      <div className="page-kicker">{merchant.id} · ALL ENRICHMENTS</div>
      <h1 className="page-title">Full enrichment dossier</h1>
      <p className="page-sub">Every signal the system fetched for {merchant.inputs.legalName}, organized by category. Concerning signals are expanded by default — click any source to drill into the underlying data.</p>

      <div className="enrichments-summary">
        <div className="stat">
          <div className="stat-label">Total enrichments</div>
          <div className="stat-value">{total}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Clean</div>
          <div className="stat-value ok">{clean}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Flagged</div>
          <div className="stat-value bad">{flagged}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Failed</div>
          <div className="stat-value">0</div>
        </div>
      </div>

      <div className="enrichments-page">
        {Object.keys(grouped).map(cat => (
          <div key={cat} className="enrich-category">
            <div className="enrich-category-title">{cat}</div>
            {grouped[cat].map(e => {
              const idx = globalIdx++;
              const isExpanded = expanded[idx];
              return (
                <div key={idx} className={`enrich-card ${e.flagged ? "flagged" : "ok"} ${isExpanded ? "expanded" : ""}`}>
                  <div className="enrich-card-head" onClick={() => toggle(idx)}>
                    <div className={`enrich-card-icon ${e.flagged ? "bad" : "ok"}`}>{e.flagged ? "✕" : "✓"}</div>
                    <div>
                      <div className="enrich-card-name">{e.name}</div>
                      <div className="enrich-card-summary">{e.summary}</div>
                    </div>
                    <div className={`enrich-card-status ${e.flagged ? "bad" : "ok"}`}>{e.flagged ? "Flagged" : "Clean"}</div>
                    <div className="enrich-card-chevron">›</div>
                  </div>
                  {isExpanded && (
                    <div className="enrich-card-body">
                      <p>{e.body}</p>
                      <div className="meta-row">
                        <span>Source: <b>{e.source.split("·")[0].trim()}</b></span>
                        <span>Quality: <b>{e.flagged ? "High" : "High"}</b></span>
                      </div>
                      <span className="source-cta" onClick={() => onSourceClick(e.source)}>View raw response →</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </>
  );
}

// Helper to derive flags from a merchant for the enrichments page
function deriveFlagsFromMerchant(merchant) {
  // If flags were stored at submission time, use them; else recompute
  return calculateVerdict(merchant.inputs).flags;
}

          <div className="side-block">
            <h3>Confidence</h3>
            <p style={{ fontSize: 12.5, color: "var(--muted)", lineHeight: 1.55 }}>
              System confidence: <b style={{color: "var(--ink)"}}>{(confidence * 100).toFixed(0)}%</b>. AI tasks above their confidence floors. No conflicts. No critical enrichment failures.
            </p>
          </div>
        </aside>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [route, setRoute] = useState("queue"); // queue | submit | processing | decision | enrichments | audit
  const [merchants, setMerchants] = useState(SEED_MERCHANTS);
  const [pendingInputs, setPendingInputs] = useState(null);
  const [activeMerchant, setActiveMerchant] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [drawerDetail, setDrawerDetail] = useState(null);

  function handleSelect(m) {
    setActiveMerchant(enrichMerchantForView(m));
    setRoute("decision");
  }

  function handleSubmitNew() {
    setRoute("submit");
  }

  function handleSubmitInputs(inputs) {
    setPendingInputs(inputs);
    setRoute("processing");
  }

  function handleProcessingComplete(calc) {
    const id = "APP-2026-" + (4720 + merchants.length).toString().padStart(5, "0");
    const decisionId = id.replace("APP", "DEC") + "-v1";
    const evidence = buildEvidence(pendingInputs, calc);
    const brief = buildAnalystBrief(pendingInputs, calc, evidence);

    const newMerchant = {
      id,
      submittedAt: "just now",
      submittedBy: "Razorpay",
      inputs: pendingInputs,
      verdict: calc.verdict,
      score: calc.score,
      confidence: calc.confidence,
      decisionId,
      supporting: evidence.supporting,
      concerning: evidence.concerning,
      brief,
    };

    setMerchants(prev => [newMerchant, ...prev]);
    setActiveMerchant(newMerchant);
    setRoute("decision");
  }

  function handleAudit() {
    setRoute("audit");
  }

  function handleViewAllEnrichments() {
    setRoute("enrichments");
  }

  function handleBackToDecision() {
    setRoute("decision");
  }

  function handleBackToQueue() {
    setActiveMerchant(null);
    setPendingInputs(null);
    setRoute("queue");
  }

  function handleSourceClick(sourceText) {
    if (!activeMerchant) return;
    const calc = calculateVerdict(activeMerchant.inputs);
    const detail = buildSourceDetail(sourceText, activeMerchant.inputs, calc);
    setDrawerDetail(detail);
    setDrawerOpen(true);
  }

  function handleCloseDrawer() {
    setDrawerOpen(false);
    // Keep detail mounted briefly during slide-out animation
    setTimeout(() => setDrawerDetail(null), 300);
  }

  function enrichMerchantForView(m) {
    // For seed merchants, build evidence on the fly
    if (m.supporting && m.concerning) return m;
    const calc = calculateVerdict(m.inputs);
    const evidence = buildEvidence(m.inputs, calc);
    const brief = buildAnalystBrief(m.inputs, calc, evidence);
    return { ...m, supporting: evidence.supporting, concerning: evidence.concerning, brief };
  }

  // ESC key closes drawer
  useEffect(() => {
    function onKey(e) {
      if (e.key === "Escape" && drawerOpen) handleCloseDrawer();
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [drawerOpen]);

  // Crumbs string per route
  const crumbs = {
    queue: ["Risk console", "Onboarding queue"],
    submit: ["Risk console", "Onboarding queue", "New application"],
    processing: ["Risk console", "Onboarding queue", "Processing"],
    decision: ["Risk console", "Onboarding queue", activeMerchant?.id || "Decision"],
    enrichments: ["Risk console", activeMerchant?.id || "Decision", "All enrichments"],
    audit: ["Risk console", activeMerchant?.id || "Decision", "Audit log"],
  }[route];

  return (
    <>
      <header className="topbar">
        <div className="brand" onClick={handleBackToQueue}>modus<span className="dot">.</span>ai</div>
        <div className="crumbs">
          {crumbs.map((c, i) => (
            <React.Fragment key={i}>
              {i === crumbs.length - 1 ? <span>{c}</span> : <>{c}<span className="sep">/</span></>}
            </React.Fragment>
          ))}
        </div>
        <div className="user-info">
          <span>Priya Menon · Senior Analyst</span>
          <span className="avatar">PM</span>
        </div>
      </header>

      <main className="shell">
        {route === "queue" && (
          <QueueScreen merchants={merchants} onSelect={handleSelect} onSubmitNew={handleSubmitNew} />
        )}
        {route === "submit" && (
          <SubmitScreen onCancel={handleBackToQueue} onSubmit={handleSubmitInputs} />
        )}
        {route === "processing" && pendingInputs && (
          <ProcessingScreen inputs={pendingInputs} onComplete={handleProcessingComplete} />
        )}
        {route === "decision" && activeMerchant && (
          <DecisionScreen
            merchant={activeMerchant}
            onBack={handleBackToQueue}
            onAudit={handleAudit}
            onViewAllEnrichments={handleViewAllEnrichments}
            onSourceClick={handleSourceClick}
          />
        )}
        {route === "enrichments" && activeMerchant && (
          <EnrichmentsScreen
            merchant={activeMerchant}
            onBack={handleBackToDecision}
            onSourceClick={handleSourceClick}
          />
        )}
        {route === "audit" && activeMerchant && (
          <AuditScreen merchant={activeMerchant} onBack={handleBackToDecision} />
        )}
      </main>

      <Drawer open={drawerOpen} detail={drawerDetail} onClose={handleCloseDrawer} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
